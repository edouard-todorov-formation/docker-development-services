name: bdd-mysql

services:
    mysql:
        image: mysql:8.4
        container_name: mysql-server

        restart: unless-stopped

        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

        ports:
            - "3306:3306"

        volumes:
            - ./data-mysql:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: phpmyadmin

        restart: unless-stopped

        depends_on:
            - mysql

        environment:
            PMA_HOST: ${PMA_HOST}

        ports:
            - "8080:80"