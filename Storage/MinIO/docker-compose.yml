name: storage-minio

services:
    minio:
        image: minio/minio:latest
        container_name: minio-server

        restart: unless-stopped

        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

        command: server /data --console-address ":9001"

        ports:
            - "9000:9000"
            - "9001:9001"

        volumes:
            - ./data-minio:/data